<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autonomous Arcade</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: #0f0f1a;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      #app {
        flex: 1;
        max-width: 960px;
        margin: 0 auto;
        padding: 2rem 1rem;
        width: 100%;
      }

      /* Player Identity */
      .player-identity {
        background: #1a1a2e;
        border-radius: 8px;
        padding: 0.75rem 1rem;
        margin-bottom: 2rem;
        font-size: 0.85rem;
        color: #a0a0c0;
        word-break: break-all;
      }

      .player-identity__label {
        font-weight: 600;
        color: #c0c0e0;
      }

      /* Game Hub */
      .game-hub h1 {
        text-align: center;
        font-size: 2.5rem;
        margin-bottom: 1.5rem;
        background: linear-gradient(135deg, #6c63ff, #e04ef0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .game-hub__grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 1.5rem;
      }

      .game-card {
        background: #1a1a2e;
        border: 1px solid #2a2a4a;
        border-radius: 12px;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        transition: border-color 0.2s;
      }

      .game-card:hover {
        border-color: #6c63ff;
      }

      .game-card__title {
        font-size: 1.3rem;
        color: #f0f0f0;
      }

      .game-card__description {
        flex: 1;
        font-size: 0.9rem;
        color: #9090a0;
      }

      .game-card__status {
        display: inline-block;
        font-size: 0.8rem;
        font-weight: 600;
        padding: 0.25rem 0.75rem;
        border-radius: 20px;
        width: fit-content;
      }

      .game-card__status--available {
        background: #2a4a2a;
        color: #6fcf6f;
      }

      .game-card__status--coming-soon {
        background: #2a2a4a;
        color: #9090c0;
      }

      /* Score Display */
      .score-display {
        display: flex;
        gap: 1.5rem;
        justify-content: center;
        padding: 1rem;
        background: #1a1a2e;
        border-radius: 8px;
        margin-top: 2rem;
        font-size: 1.1rem;
        font-weight: 600;
      }

      .score-display__score {
        color: #6c63ff;
      }

      .score-display__runs {
        color: #e04ef0;
      }

      /* Footer */
      .site-footer {
        text-align: center;
        padding: 1.5rem 1rem;
        border-top: 1px solid #2a2a4a;
        margin-top: 2rem;
        font-size: 0.85rem;
        color: #707090;
      }

      .site-footer__attribution {
        margin-bottom: 0.25rem;
      }

      .site-footer__build-log a {
        color: #6c63ff;
        text-decoration: none;
      }

      .site-footer__build-log a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Shell view: contains the hub, player identity, score display, and footer -->
      <div id="shell-view">
        <!-- Player Identity -->
        <div class="player-identity">
          <span class="player-identity__label">Player ID:</span>
          <span id="player-id">Loading...</span>
        </div>

        <!-- Game Hub -->
        <div id="game-hub"></div>

        <!-- Score Display -->
        <div id="score-display"></div>

        <!-- Footer -->
        <footer id="site-footer"></footer>
      </div>

      <!-- Game container: individual games render here -->
      <div id="game-view" style="display:none;"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

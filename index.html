<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autonomous Arcade</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: #0f0f1a;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      #app {
        flex: 1;
        max-width: 960px;
        margin: 0 auto;
        padding: 2rem 1rem;
        width: 100%;
      }

      /* Player Identity */
      .player-identity {
        background: #1a1a2e;
        border-radius: 8px;
        padding: 0.75rem 1rem;
        margin-bottom: 2rem;
        font-size: 0.85rem;
        color: #a0a0c0;
        word-break: break-all;
      }

      .player-identity__label {
        font-weight: 600;
        color: #c0c0e0;
      }

      /* Game Hub */
      .game-hub h1 {
        text-align: center;
        font-size: 2.5rem;
        margin-bottom: 1.5rem;
        background: linear-gradient(135deg, #6c63ff, #e04ef0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .game-hub__grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 1.5rem;
      }

      .game-card {
        background: #1a1a2e;
        border: 1px solid #2a2a4a;
        border-radius: 12px;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        transition: border-color 0.2s;
      }

      .game-card:hover {
        border-color: #6c63ff;
      }

      .game-card__title {
        font-size: 1.3rem;
        color: #f0f0f0;
      }

      .game-card__description {
        flex: 1;
        font-size: 0.9rem;
        color: #9090a0;
      }

      .game-card__status {
        display: inline-block;
        font-size: 0.8rem;
        font-weight: 600;
        padding: 0.25rem 0.75rem;
        border-radius: 20px;
        width: fit-content;
      }

      .game-card__status--available {
        background: #2a4a2a;
        color: #6fcf6f;
      }

      .game-card__status--coming-soon {
        background: #2a2a4a;
        color: #9090c0;
      }

      /* Living Dungeon Mini */
      .dungeon-game {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }

      .dungeon-game__header {
        display: flex;
        align-items: center;
        gap: 1rem;
        width: 100%;
      }

      .dungeon-game__back {
        background: #2a2a4a;
        color: #c0c0e0;
        border: none;
        border-radius: 8px;
        padding: 0.5rem 1rem;
        cursor: pointer;
        font-size: 0.9rem;
        transition: background 0.2s;
      }

      .dungeon-game__back:hover {
        background: #3a3a5a;
      }

      .dungeon-game__title {
        font-size: 1.6rem;
        color: #f0f0f0;
      }

      .dungeon-game__info {
        display: flex;
        gap: 2rem;
        font-size: 1rem;
        font-weight: 600;
      }

      .dungeon-game__score {
        color: #6fcf6f;
      }

      .dungeon-game__turns {
        color: #6c63ff;
      }

      .dungeon-game__status {
        color: #e0e0e0;
      }

      .dungeon-game__status--won {
        color: #6fcf6f;
      }

      .dungeon-game__status--dead {
        color: #e04e4e;
      }

      .dungeon-game__grid {
        display: flex;
        flex-direction: column;
        gap: 0;
        border: 2px solid #2a2a4a;
        border-radius: 4px;
        overflow: hidden;
      }

      .dungeon-row {
        display: flex;
      }

      .dungeon-cell {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        border: 1px solid #1a1a2e;
        background: #141428;
      }

      .dungeon-cell.cell--wall {
        background: #2a2a4a;
        color: #606080;
      }

      .dungeon-cell.cell--player {
        background: #2a3a5a;
      }

      .dungeon-cell.cell--exit {
        background: #2a4a2a;
      }

      .dungeon-cell.cell--treasure {
        background: #3a3a1a;
      }

      .dungeon-cell.cell--hazard {
        background: #3a1a1a;
      }

      .dungeon-game__dpad {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.25rem;
      }

      .dpad-row {
        display: flex;
        gap: 0.25rem;
      }

      .dpad-btn {
        width: 44px;
        height: 44px;
        font-size: 1.2rem;
        font-weight: bold;
        background: #2a2a4a;
        color: #c0c0e0;
        border: 1px solid #3a3a5a;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .dpad-btn:hover {
        background: #3a3a5a;
      }

      .dpad-btn:active {
        background: #4a4a6a;
      }

      .dungeon-game__new-game {
        background: #6c63ff;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0.6rem 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }

      .dungeon-game__new-game:hover {
        background: #5a52e0;
      }

      .dungeon-game__history {
        background: #1a1a2e;
        border-radius: 8px;
        padding: 1rem 1.5rem;
        width: 100%;
        max-width: 400px;
        text-align: center;
      }

      .dungeon-game__history h3 {
        font-size: 1rem;
        color: #c0c0e0;
        margin-bottom: 0.5rem;
      }

      .dungeon-game__history-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        justify-content: center;
        font-size: 0.9rem;
        color: #9090c0;
      }

      /* Word Grid */
      .word-grid-game {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }

      .word-grid-game__header {
        display: flex;
        align-items: center;
        gap: 1rem;
        width: 100%;
      }

      .word-grid-game__back {
        background: #2a2a4a;
        color: #c0c0e0;
        border: none;
        border-radius: 8px;
        padding: 0.5rem 1rem;
        cursor: pointer;
        font-size: 0.9rem;
        transition: background 0.2s;
      }

      .word-grid-game__back:hover {
        background: #3a3a5a;
      }

      .word-grid-game__title {
        font-size: 1.6rem;
        color: #f0f0f0;
      }

      .word-grid-game__info {
        display: flex;
        gap: 2rem;
        font-size: 1rem;
        font-weight: 600;
      }

      .word-grid-game__score {
        color: #6fcf6f;
      }

      .word-grid-game__timer {
        color: #e04ef0;
      }

      .word-grid-game__player-id {
        font-size: 0.85rem;
        color: #9090c0;
        word-break: break-all;
      }

      .word-grid-game__grid {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        border: 2px solid #2a2a4a;
        border-radius: 8px;
        padding: 0.5rem;
        background: #141428;
      }

      .word-grid-row {
        display: flex;
        gap: 0.25rem;
        justify-content: center;
      }

      .word-grid-cell {
        width: 60px;
        height: 60px;
        font-size: 1.4rem;
        font-weight: 700;
        background: #1a1a2e;
        color: #e0e0e0;
        border: 2px solid #2a2a4a;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, transform 0.1s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .word-grid-cell:hover {
        background: #2a2a4a;
        border-color: #6c63ff;
      }

      .word-grid-cell--selected {
        background: #2a3a5a;
        border-color: #6c63ff;
        transform: scale(1.05);
      }

      .word-grid-game__input-area {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
        justify-content: center;
        width: 100%;
        max-width: 400px;
      }

      .word-grid-game__word-display {
        width: 100%;
        min-height: 2rem;
        font-size: 1.3rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-align: center;
        background: #1a1a2e;
        border-radius: 8px;
        padding: 0.5rem 1rem;
        color: #6c63ff;
      }

      .word-grid-game__message {
        width: 100%;
        text-align: center;
        font-size: 0.9rem;
        color: #9090c0;
        min-height: 1.3rem;
      }

      .word-grid-game__submit-btn {
        background: #6fcf6f;
        color: #0f0f1a;
        border: none;
        border-radius: 8px;
        padding: 0.6rem 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }

      .word-grid-game__submit-btn:hover {
        background: #5ab85a;
      }

      .word-grid-game__submit-btn:disabled {
        background: #3a3a5a;
        color: #707090;
        cursor: not-allowed;
      }

      .word-grid-game__new-game-btn {
        background: #6c63ff;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0.6rem 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }

      .word-grid-game__new-game-btn:hover {
        background: #5a52e0;
      }

      .word-grid-game__word-list {
        background: #1a1a2e;
        border-radius: 8px;
        padding: 1rem 1.5rem;
        width: 100%;
        max-width: 400px;
        text-align: center;
      }

      .word-grid-game__word-list h3 {
        font-size: 1rem;
        color: #c0c0e0;
        margin-bottom: 0.5rem;
      }

      .word-grid-game__word-list p {
        color: #9090c0;
        font-size: 0.9rem;
        word-break: break-word;
      }

      .word-grid-game__history {
        background: #1a1a2e;
        border-radius: 8px;
        padding: 1rem 1.5rem;
        width: 100%;
        max-width: 400px;
        text-align: center;
      }

      .word-grid-game__history h3 {
        font-size: 1rem;
        color: #c0c0e0;
        margin-bottom: 0.5rem;
      }

      .word-grid-game__history-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        justify-content: center;
        font-size: 0.9rem;
        color: #9090c0;
      }

      /* Score Display */
      .score-display {
        display: flex;
        gap: 1.5rem;
        justify-content: center;
        padding: 1rem;
        background: #1a1a2e;
        border-radius: 8px;
        margin-top: 2rem;
        font-size: 1.1rem;
        font-weight: 600;
      }

      .score-display__score {
        color: #6c63ff;
      }

      .score-display__runs {
        color: #e04ef0;
      }

      /* Footer */
      .site-footer {
        text-align: center;
        padding: 1.5rem 1rem;
        border-top: 1px solid #2a2a4a;
        margin-top: 2rem;
        font-size: 0.85rem;
        color: #707090;
      }

      .site-footer__attribution {
        margin-bottom: 0.25rem;
      }

      .site-footer__build-log a {
        color: #6c63ff;
        text-decoration: none;
      }

      .site-footer__build-log a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Shell view: contains the hub, player identity, score display, and footer -->
      <div id="shell-view">
        <!-- Player Identity -->
        <div class="player-identity">
          <span class="player-identity__label">Player ID:</span>
          <span id="player-id">Loading...</span>
        </div>

        <!-- Game Hub -->
        <div id="game-hub"></div>

        <!-- Score Display -->
        <div id="score-display"></div>

        <!-- Footer -->
        <footer id="site-footer"></footer>
      </div>

      <!-- Game container: individual games render here -->
      <div id="game-view" style="display:none;"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
